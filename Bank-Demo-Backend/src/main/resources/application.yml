server:
  port: 8080

spring:
  application:
    name: bank-demo-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bank_core_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:1}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:123456}

# 🚀 ESKİ AJANIN ŞİFRESİ (Backend'in çökmemesi için şart)
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 1 gün

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true