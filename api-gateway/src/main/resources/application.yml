server:
  port: 8081
  # 🚀 YENİ EKLENDİ: Nginx'in fısıldadığı X-Forwarded başlıklarına GÜVEN!
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI}
          # Gateway Keycloak'a HTTPS ile değil, doğrudan iç ağdan şifresiz gidecek!
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URL}/realms/bank-realm/protocol/openid-connect/certs
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          
          # ==========================================
          # 🚀 SWAGGER KURYELERİ (Gizli Tüneller)
          # ==========================================
          routes:
            - id: openapi-backend
              uri: lb://BANK-DEMO-BACKEND
              predicates:
                - Path=/v3/api-docs/backend
              filters:
                - RewritePath=/v3/api-docs/backend, /v3/api-docs

            - id: openapi-auth
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/v3/api-docs/auth
              filters:
                - RewritePath=/v3/api-docs/auth, /v3/api-docs

            - id: openapi-corporate
              uri: lb://BANK-CORPORATE-MICRO
              predicates:
                - Path=/v3/api-docs/corporate
              filters:
                - RewritePath=/v3/api-docs/corporate, /v3/api-docs

            - id: openapi-bill
              uri: lb://BANK-BILL-MICRO
              predicates:
                - Path=/v3/api-docs/bill
              filters:
                - RewritePath=/v3/api-docs/bill, /v3/api-docs

            - id: openapi-currency
              uri: lb://BANK-CURRENCY-MICRO
              predicates:
                - Path=/v3/api-docs/currency
              filters:
                - RewritePath=/v3/api-docs/currency, /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

# ==========================================
# 📚 YENİ EKLENDİ: KURUMSAL SWAGGER VİTRİNİ (Dropdown)
# ==========================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 🏦 Core Backend
        url: /v3/api-docs/backend
      - name: 🔐 Auth Service
        url: /v3/api-docs/auth
      - name: 🏢 Corporate Service
        url: /v3/api-docs/corporate
      - name: 🧾 Bill Service
        url: /v3/api-docs/bill
      - name: 💶 Currency Service
        url: /v3/api-docs/currency

# ==========================================
# 🔭 YENİ EKLENDİ: ACTUATOR (İSTİHBARAT) AYARLARI
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus # Sadece sağlık ve metrik kapılarını aç
  endpoint:
    health:
      show-details: always # Veritabanı ve Redis durumlarını da rapora dahil et
  prometheus:
    metrics:
      export:
        enabled: true