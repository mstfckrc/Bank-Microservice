server:
  port: 8081
  # 🚀 YENİ EKLENDİ: Nginx'in fısıldadığı X-Forwarded başlıklarına GÜVEN!
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI}
          # Gateway Keycloak'a HTTPS ile değil, doğrudan iç ağdan şifresiz gidecek!
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URL}/realms/bank-realm/protocol/openid-connect/certs
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

# ==========================================
# 🔭 YENİ EKLENDİ: ACTUATOR (İSTİHBARAT) AYARLARI
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus # Sadece sağlık ve metrik kapılarını aç
  endpoint:
    health:
      show-details: always # Veritabanı ve Redis durumlarını da rapora dahil et
  prometheus:
    metrics:
      export:
        enabled: true