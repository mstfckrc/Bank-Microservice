server:
  port: 8081

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"

      routes:
        # 🚀 1. YENİ ROTA: Kur isteklerini doğrudan yeni askere yolla! (En üste yazılır)
        - id: currency-route
          uri: http://bank_currency_micro:8083
          predicates:
            - Path=/api/v1/currencies/**

        # 2. ESKİ ROTA: Geri kalan her şeyi (Hesap, Kullanıcı vb.) eski Karargaha yolla
        - id: monolith-route
          uri: http://bank_backend_micro:8080
          predicates:
            - Path=/api/v1/**
          #filters:
          #  - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/