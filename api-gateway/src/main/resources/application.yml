server:
  port: 8081

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # SADECE DEĞİŞKEN ADLARI:
          issuer-uri: ${OAUTH_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URL}/realms/bank-realm/protocol/openid-connect/certs
  data:
    redis:
      # SADECE DEĞİŞKEN ADLARI:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      # İŞTE SENİN İSTEDİĞİN O TEMİZ YAPI:
      defaultZone: ${EUREKA_URL}