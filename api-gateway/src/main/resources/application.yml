server:
  port: 8081

# 🚀 jwt.secret TAMAMEN SİLİNDİ! Yerine Keycloak Adresi geldi:
spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # 1. Token'ın üstünde yazan mühür (Postman'den bu adresle aldığın için)
          issuer-uri: http://localhost:9090/realms/bank-realm
          # 2. Gateway'in anahtarları indirmek için İÇ AĞDAN gideceği gerçek adres
          jwk-set-uri: http://keycloak:8080/realms/bank-realm/protocol/openid-connect/certs
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}