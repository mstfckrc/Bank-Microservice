server:
  port: 8085 # Kurumsal servisimiz bu portta çalışacak

spring:
  application:
    name: bank-corporate-micro

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bank_corporate_db} # Yeni DB adı!
    username: ${DB_USER:postgres}
    password: ${DB_PASS:1}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # İstersen geliştirme aşamasında true yapabilirsin

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:123456}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true