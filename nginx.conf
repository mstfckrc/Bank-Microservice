events {
    worker_connections 1024;
}

http {
    # 🚀 1. KURAL: BÜTÜN HTTP (80) TRAFİĞİNİ HTTPS'E FIRLAT!
    server {
        listen 80;
        server_name bank.local *.bank.local;
        return 301 https://$host$request_uri;
    }

    # =========================================================
    # 🛡️ 2. KURAL: 443 PORTU VE ŞİFRE ÇÖZÜCÜ KARARGAH AĞI
    # =========================================================

    # 🖥️ VİTRİN (Next.js)
    server {
        listen 443 ssl;
        server_name app.bank.local;

        # Sertifika Zırhları
        ssl_certificate /etc/nginx/certs/bank_local.crt;
        ssl_certificate_key /etc/nginx/certs/bank_local.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://bank_frontend_micro:3000;
            
            # 🚀 HAYAT KURTARAN MÜHÜRLER
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # 🔐 KİMLİK ÜSSÜ (Keycloak)
    server {
        listen 443 ssl;
        server_name auth.bank.local;

        ssl_certificate /etc/nginx/certs/bank_local.crt;
        ssl_certificate_key /etc/nginx/certs/bank_local.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://bank_keycloak_server:8080;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            # 🚀 KEYCLOAK'U SAKİNLEŞTİREN MÜHÜRLER
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # 🌟 SINIR KAPISI (API Gateway)
    server {
        listen 443 ssl;
        server_name api.bank.local;

        ssl_certificate /etc/nginx/certs/bank_local.crt;
        ssl_certificate_key /etc/nginx/certs/bank_local.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://bank_api_gateway_micro:8081;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # 🏛️ NÜFUS DAİRESİ (Eureka)
    server {
        listen 443 ssl;
        server_name eureka.bank.local;

        ssl_certificate /etc/nginx/certs/bank_local.crt;
        ssl_certificate_key /etc/nginx/certs/bank_local.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://bank_discovery_server_micro:8761;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # 📊 RADAR EKRANI (Grafana)
    server {
        listen 443 ssl;
        server_name monitor.bank.local;

        ssl_certificate /etc/nginx/certs/bank_local.crt;
        ssl_certificate_key /etc/nginx/certs/bank_local.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            # 🚀 DİKKAT: Docker iç ağında Grafana 3000 portunda çalışır!
            proxy_pass http://bank_grafana_micro:3000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }
}