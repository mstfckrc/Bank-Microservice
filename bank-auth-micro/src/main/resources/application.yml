server:
  port: 8086

spring:
  application:
    name: auth-service

  datasource:
    # 🚀 SADECE DEĞİŞKEN ADLARI:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    # 🚀 SADECE DEĞİŞKEN ADLARI:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

eureka:
  client:
    service-url:
      # 🚀 SADECE DEĞİŞKEN ADI:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

keycloak:
  # 🚀 İÇ AĞ ROTASI DEĞİŞKENE BAĞLANDI:
  auth-server-url: ${KEYCLOAK_INTERNAL_URL}
  realm: bank-realm
  client-id: bank-auth-client
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

recaptcha:
  secret: ${RECAPTCHA_SECRET}

# ==========================================
# 🔭 YENİ EKLENDİ: ACTUATOR (İSTİHBARAT) AYARLARI
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true