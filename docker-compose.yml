version: '3.8'

name: bank-microservice-env

services:
  # ==========================================
  # 🗄️ 1. MÜSTAKİL VERİTABANLARI (FİZİKSEL İZOLASYON)
  # ==========================================
  
  postgres-core:
    image: postgres:15-alpine
    container_name: bank_postgres_core
    environment:
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASS}
      POSTGRES_DB: bank_core_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_core:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  postgres-auth:
    image: postgres:15-alpine
    container_name: bank_postgres_auth
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS}
      POSTGRES_DB: bank_auth_db
    ports:
      - "5434:5432" 
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  postgres-bill:
    image: postgres:15-alpine
    container_name: bank_postgres_bill
    environment:
      POSTGRES_USER: ${BILL_DB_USER}
      POSTGRES_PASSWORD: ${BILL_DB_PASS}
      POSTGRES_DB: bank_bill_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_bill:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  postgres-corporate:
    image: postgres:15-alpine
    container_name: bank_postgres_corporate
    environment:
      POSTGRES_USER: ${CORP_DB_USER}
      POSTGRES_PASSWORD: ${CORP_DB_PASS}
      POSTGRES_DB: bank_corporate_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_corporate:/var/lib/postgresql/data
    networks:
      - bank-network-micro
    
  # ==========================================
  # 🚀 MİKROSERVİSLER
  # ==========================================

  # 🏦 KARARGAH (Core Backend)
  backend:
    build:
      context: ./Bank-Demo-Backend
      dockerfile: Dockerfile
    container_name: bank_backend_micro
    restart: on-failure
    depends_on:
      - postgres-core 
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=${CORE_DB_URL}
      - DB_USER=${CORE_DB_USER}
      - DB_PASS=${CORE_DB_PASS}
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASS}
      - EUREKA_URL=${EUREKA_URL}
      - ELASTICSEARCH_URL=${ES_URL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - bank-network-micro

  # 🌟 SINIR KAPISI (API Gateway)
  api-gateway:
    build:
      context: ./api-gateway 
      dockerfile: Dockerfile
    container_name: bank_api_gateway_micro
    restart: on-failure
    depends_on:
      - backend 
      - discovery-server
      - bill-service 
      - auth-service
      - redis 
    environment:
      - SPRING_REDIS_HOST=${REDIS_HOST}
      - SPRING_REDIS_PORT=${REDIS_PORT}
      # 🚀 YENİ EKLENDİ: Artık IP değil, tertemiz Domain okuyacak!
      - OAUTH_ISSUER_URI=${OAUTH_ISSUER_URI}
      - KEYCLOAK_INTERNAL_URL=${KC_INTERNAL_URL}
      - EUREKA_URL=${EUREKA_URL}
    # 🚀 NGINX OPERASYONU: Gateway'in körlüğünü çözen fısıltı
    extra_hosts:
      - "auth.bank.local:host-gateway"
    networks:
      - bank-network-micro

  # 📯 POSTANE (Notification Service)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: bank_notification_micro
    restart: on-failure
    depends_on:
      - rabbitmq
      - discovery-server
    environment:
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASS}
      - EUREKA_URL=${EUREKA_URL}
    ports:
      - "8082:8082"
    networks:
      - bank-network-micro

  # 💶 DÖVİZ SERVİSİ
  currency-service:
    build: ./currency-service
    container_name: bank_currency_micro
    ports:
      - "8083:8083"
    environment:
      - EUREKA_URL=${EUREKA_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      - discovery-server
    networks:
      - bank-network-micro

  # 🧾 FATURA SERVİSİ
  bill-service:
    build:
      context: ./bill-service 
      dockerfile: Dockerfile
    container_name: bank_bill_micro
    restart: on-failure
    depends_on:
      - postgres-bill
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=${BILL_DB_URL}
      - DB_USER=${BILL_DB_USER}
      - DB_PASS=${BILL_DB_PASS}
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASS}
      - EUREKA_URL=${EUREKA_URL}
    ports:
      - "8084:8084"
    networks:
      - bank-network-micro

  # 🏢 KURUMSAL İK VE MAAŞ SERVİSİ
  corporate-service:
    build:
      context: ./bank-corporate-micro 
      dockerfile: Dockerfile
    container_name: bank_corporate_micro
    restart: on-failure
    depends_on:
      - postgres-corporate
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=${CORP_DB_URL}
      - DB_USER=${CORP_DB_USER}
      - DB_PASS=${CORP_DB_PASS}
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASS}
      - EUREKA_URL=${EUREKA_URL}
    ports:
      - "8085:8085"
    networks:
      - bank-network-micro

  # 🔐 KİMLİK VE YETKİLENDİRME ÜSSÜ (Auth Service)
  auth-service:
    build:
      context: ./bank-auth-micro
      dockerfile: Dockerfile
    container_name: bank_auth_micro
    restart: on-failure
    depends_on:
      - postgres-auth
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=${AUTH_DB_URL}
      - DB_USER=${AUTH_DB_USER}
      - DB_PASS=${AUTH_DB_PASS}
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASS}
      - EUREKA_URL=${EUREKA_URL}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - RECAPTCHA_SECRET=${RECAPTCHA_SECRET}
      - KEYCLOAK_INTERNAL_URL=${KC_INTERNAL_URL}
    ports:
      - "8086:8086"
    networks:
      - bank-network-micro

  # 🖥️ VİTRİN (Next.js Frontend)
  frontend:
    build:
      context: ./Bank-Demo-Frontend
      dockerfile: Dockerfile
    container_name: bank_frontend_micro
    depends_on:
      - api-gateway
    env_file:
      - ./Bank-Demo-Frontend/.env.local
    # 🚀 NGINX OPERASYONU: Dış dünyaya kapatıldı
    # ports:
    #   - "3000:3000"
    # 🚀 NGINX OPERASYONU: Docker'ın DNS körlüğünü çözen sihirli komutlar!
    extra_hosts:
      - "app.bank.local:host-gateway"
      - "api.bank.local:host-gateway"
      - "auth.bank.local:host-gateway"
    networks:
      - bank-network-micro

  # 🏛️ NÜFUS DAİRESİ (Eureka Service Discovery)
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: bank_discovery_server_micro
    restart: on-failure
    # 🚀 NGINX OPERASYONU: Sadece Nginx (eureka.bank.local) üzerinden girilecek
    # ports:
    #  - "8761:8761"
    networks:
      - bank-network-micro

  # 🛡️ KEYCLOAK İÇİN ÖZEL VERİTABANI
  keycloak-db:
    image: postgres:15
    container_name: bank_keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASS}
    ports:
      - "5433:5432" 
    volumes: 
      - pgdata_keycloak:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  # 🏰 KEYCLOAK SUNUCUSU
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: bank_keycloak_server
    command: start-dev 
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASS}
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS}
      # 🚀 YENİ EKLENEN SİHİRLİ KOMUTLAR
      KC_PROXY_HEADERS: xforwarded    # Nginx'in yolladığı orijinal domainleri oku
      KC_HOSTNAME_STRICT: "false"     # Hardcode domain bekleme, .env esnekliğine uyum sağla
      KC_HOSTNAME: auth.bank.local
      KC_HOSTNAME_STRICT_HTTPS: "false"
    
    # 🚀 NGINX OPERASYONU: Dış dünyaya kapatıldı
    ports:
      - "9090:8080" 
    depends_on:
      - keycloak-db
    networks:
      - bank-network-micro

  # ==========================================
  # 🕵️‍♂️ ELK İSTİHBARAT AĞI (LOGLAMA SİSTEMİ)
  # ==========================================
  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: bank_elasticsearch_micro
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - bank-network-micro

  logstash:
    image: logstash:8.12.2
    container_name: bank_logstash_micro
    ports:
      - "5000:5000/tcp" 
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - bank-network-micro

  kibana:
    image: kibana:8.12.2
    container_name: bank_kibana_micro
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=${ES_URL}
    depends_on:
      - elasticsearch
    networks:
      - bank-network-micro

  # ==========================================
  # 🐇 MESAJ AĞI (RabbitMQ)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: bank_rabbitmq_micro
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASS}
    networks:
      - bank-network-micro
    restart: unless-stopped

  # ==========================================
  # 🚀 ÖNBELLEK JET MOTORU (Redis)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bank_redis_micro
    ports:
      - "6379:6379"
    networks:
      - bank-network-micro

  # ==========================================
  # 🚦 NGINX TERS VEKİL (YENİ EKLENDİ)
  # ==========================================
  nginx-proxy:
    image: nginx:alpine
    container_name: bank_nginx_proxy
    ports:
      - "80:80" 
      - "443:443" # 🚀 EKSİK OLAN HTTPS KAPISI EKLENDİ!
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro 
      - ./certs:/etc/nginx/certs:ro # 🚀 EKSİK OLAN SERTİFİKA YOLU EKLENDİ!
    depends_on:
      - frontend
      - api-gateway
      - keycloak
      - discovery-server
    networks:
      - bank-network-micro

# 📦 YENİ MÜSTAKİL VERİ DEPOLARI
volumes:
  pgdata_core:
  pgdata_auth:
  pgdata_bill:
  pgdata_corporate:
  pgdata_keycloak:

networks:
  bank-network-micro:
    driver: bridge