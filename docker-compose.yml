version: '3.8'

name: bank-microservice-env

services:
  # ==========================================
  # 🗄️ 1. MÜSTAKİL VERİTABANLARI (FİZİKSEL İZOLASYON)
  # ==========================================
  
  postgres-core:
    image: postgres:15-alpine
    container_name: bank_postgres_core
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: bank_core_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_core:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  postgres-auth:
    image: postgres:15-alpine
    container_name: bank_postgres_auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: bank_auth_db
    ports:
      - "5434:5432" # Dışarıya 5434, içeriye 5432
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  postgres-bill:
    image: postgres:15-alpine
    container_name: bank_postgres_bill
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: bank_bill_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_bill:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  postgres-corporate:
    image: postgres:15-alpine
    container_name: bank_postgres_corporate
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: bank_corporate_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_corporate:/var/lib/postgresql/data
    networks:
      - bank-network-micro

  # ==========================================
  # 🚀 MİKROSERVİSLER
  # ==========================================

  # 🏦 KARARGAH (Core Backend)
  backend:
    build:
      context: ./Bank-Demo-Backend
      dockerfile: Dockerfile
    container_name: bank_backend_micro
    restart: on-failure
    depends_on:
      - postgres-core # Sadece kendi DB'sini bekler
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=jdbc:postgresql://postgres-core:5432/bank_core_db
      - SPRING_RABBITMQ_HOST=rabbitmq 
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=123456
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "8080:8080"
    networks:
      - bank-network-micro

  # 🌟 SINIR KAPISI (API Gateway)
  api-gateway:
    build:
      context: ./api-gateway 
      dockerfile: Dockerfile
    container_name: bank_api_gateway_micro
    restart: on-failure
    depends_on:
      - backend 
      - discovery-server
      - bill-service 
      - auth-service
      - redis # 🚀 YENİ: Redis ayağa kalkmadan Gateway kalkmasın
    environment:
      - SPRING_REDIS_HOST=redis # 🚀 YENİ: Redis'in adresi
      - SPRING_REDIS_PORT=6379
    ports:
      - "8081:8081" 
    networks:
      - bank-network-micro

  # 📯 POSTANE (Notification Service)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: bank_notification_micro
    restart: on-failure
    depends_on:
      - rabbitmq
      - discovery-server
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=123456
    ports:
      - "8082:8082"
    networks:
      - bank-network-micro

  # 💶 DÖVİZ SERVİSİ
  currency-service:
    build: ./currency-service
    container_name: bank_currency_micro
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - REDIS_HOST=redis
    depends_on:
      - discovery-server
    networks:
      - bank-network-micro

  # 🧾 FATURA SERVİSİ
  bill-service:
    build:
      context: ./bill-service 
      dockerfile: Dockerfile
    container_name: bank_bill_micro
    restart: on-failure
    depends_on:
      - postgres-bill
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=jdbc:postgresql://postgres-bill:5432/bank_bill_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_URL=http://discovery-server:8761/eureka/
    ports:
      - "8084:8084"
    networks:
      - bank-network-micro

  # 🏢 KURUMSAL İK VE MAAŞ SERVİSİ
  corporate-service:
    build:
      context: ./bank-corporate-micro 
      dockerfile: Dockerfile
    container_name: bank_corporate_micro
    restart: on-failure
    depends_on:
      - postgres-corporate
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=jdbc:postgresql://postgres-corporate:5432/bank_corporate_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_URL=http://discovery-server:8761/eureka/
    ports:
      - "8085:8085"
    networks:
      - bank-network-micro

  # 🔐 KİMLİK VE YETKİLENDİRME ÜSSÜ (Auth Service)
  auth-service:
    build:
      context: ./bank-auth-micro
      dockerfile: Dockerfile
    container_name: bank_auth_micro
    restart: on-failure
    depends_on:
      - postgres-auth
      - rabbitmq
      - discovery-server
    environment:
      - DB_URL=jdbc:postgresql://postgres-auth:5432/bank_auth_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=123456
      - EUREKA_URL=http://discovery-server:8761/eureka/
    ports:
      - "8086:8086"
    networks:
      - bank-network-micro

  # 🖥️ VİTRİN (Next.js Frontend)
  frontend:
    build:
      context: ./Bank-Demo-Frontend
      dockerfile: Dockerfile
    container_name: bank_frontend_micro
    depends_on:
      - api-gateway
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081/api/v1
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:9090
      - KEYCLOAK_REALM=bank-realm
      - KEYCLOAK_CLIENT_ID=bank-auth-client
      - KEYCLOAK_CLIENT_SECRET=PJqdHOdCoRbNe5dFNATs1kZxSrrYQTel
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
    ports:
      - "3000:3000"
    networks:
      - bank-network-micro

  # 🏛️ NÜFUS DAİRESİ (Eureka Service Discovery)
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: bank_discovery_server_micro
    restart: on-failure
    ports:
      - "8761:8761"
    networks:
      - bank-network-micro

  # 🛡️ KEYCLOAK İÇİN ÖZEL VERİTABANI
  keycloak-db:
    image: postgres:15
    container_name: bank_keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" 
    networks:
      - bank-network-micro

  # 🏰 KEYCLOAK SUNUCUSU
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: bank_keycloak_server
    command: start-dev 
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin 
      KEYCLOAK_ADMIN_PASSWORD: admin 
    ports:
      - "9090:8080" 
    depends_on:
      - keycloak-db
    networks:
      - bank-network-micro

  # ==========================================
  # 🕵️‍♂️ ELK İSTİHBARAT AĞI (LOGLAMA SİSTEMİ)
  # ==========================================
  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: bank_elasticsearch_micro
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - bank-network-micro

  logstash:
    image: logstash:8.12.2
    container_name: bank_logstash_micro
    ports:
      - "5000:5000/tcp" 
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - bank-network-micro

  kibana:
    image: kibana:8.12.2
    container_name: bank_kibana_micro
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - bank-network-micro

  # ==========================================
  # 🐇 MESAJ AĞI (RabbitMQ)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: bank_rabbitmq_micro
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123456
    networks:
      - bank-network-micro
    restart: unless-stopped

  # ==========================================
  # 🚀 ÖNBELLEK JET MOTORU (Redis)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bank_redis_micro
    ports:
      - "6379:6379"
    networks:
      - bank-network-micro

# 📦 YENİ MÜSTAKİL VERİ DEPOLARI
volumes:
  pgdata_core:
  pgdata_auth:
  pgdata_bill:
  pgdata_corporate:

networks:
  bank-network-micro:
    driver: bridge